apiVersion: apps/v1
kind: Deployment
metadata:
  name: factorial-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: factorial-app
  template:
    metadata:
      labels:
        app: factorial-app
    spec:
      containers:
      - name: factorial-app
        image:  rohan65/factorial-app:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: factorial-service
spec:
  type: NodePort
  selector:
    app: factorial-app
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30007